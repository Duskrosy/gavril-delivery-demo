name: keep-alive

# Free Render web services sleep after ~15 min with no traffic. This pings the
# server every 12 minutes so it stays awake (uses ~730 of the 750 free
# instance-hours/month — within the free tier for a single service).
on:
  schedule:
    - cron: '*/12 * * * *'
  workflow_dispatch: {}   # lets you run it manually from the Actions tab too

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the multiplayer server
        run: |
          for i in 1 2 3; do
            curl -fsS --max-time 40 https://gavril-delivery-demo.onrender.com/ && exit 0
            echo "attempt $i failed; retrying…"; sleep 20
          done
          echo "server did not respond (may be cold-starting)"; exit 0
